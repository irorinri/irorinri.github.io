<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact links for irorinri: YouTube, GitHub, Itch.io, Bandcamp, and Sketchfab.">
  <title>Contact | hueryn</title>
  <link rel="stylesheet" href="effect.css">
  <style>
    .contact-card {
      text-align: center;
    }

    .contact-links {
      display: grid;
      gap: 0.35rem;
      margin: 0.7rem 0 1rem;
      padding: 0;
      list-style: none;
      text-align: left;
    }

    .contact-links a {
      color: #5f7795;
      text-decoration: none;
      border-bottom: 1px dotted #90a4be;
    }

    .contact-links a:hover {
      text-decoration: underline;
    }

    .home-btn-group {
      margin-bottom: 0.8rem;
    }

    .home-btn-group .home-btn {
      margin: 0 0.2em;
    }

    .contact-heading {
      margin-bottom: 0.9rem;
    }

    .contact-note {
      margin: 0.5rem 0 0;
      color: #4c5a6f;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="schedule-main">
    <section class="card contact-card">
      <div class="home-btn-group">
        <a href="profile.html" class="home-btn">Home</a>
        <a href="archive.html" class="home-btn">Archive</a>
      </div>

      <p class="schedule-coming contact-heading">Find me here:</p>
      <ul class="contact-links" aria-label="External links">
        <li><a href="https://www.youtube.com/@irorinri" target="_blank" rel="noopener">YouTube</a></li>
        <li><a href="https://github.com/irorinri" target="_blank" rel="noopener">GitHub</a></li>
        <li><a href="https://irorinri.itch.io" target="_blank" rel="noopener">Itch.io</a></li>
        <li><a href="https://irorinri.bandcamp.com/" target="_blank" rel="noopener">Bandcamp</a></li>
        <li><a href="https://sketchfab.com/irorinri" target="_blank" rel="noopener">Sketchfab</a></li>
      </ul>
      <p class="contact-note">For messages, please use DM on YouTube or contact me via GitHub profile.</p>
    </section>
  </main>
  <footer>
    &copy; irorinri | <a href="profile.html">Profile</a> | <a href="archive.html">Archive</a>
  </footer>
</body>
</html>
