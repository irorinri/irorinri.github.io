<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Illustration archive by irorinri.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draws | irorinri</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/photoswipe@5/dist/photoswipe.css">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
      padding: 0.5rem 0 0;
    }

    .gallery a {
      color: inherit;
      text-decoration: none;
    }

    .gallery img {
      width: 100%;
      height: auto;
      border-radius: 18px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    .hidden-caption-content {
      display: none;
    }

    .pswp__counter {
      display: none;
    }

    .pswp__custom-caption {
      position: absolute;
      right: 0;
      bottom: 28px;
      left: 0;
      z-index: 1000;
      padding: 5px;
      color: #000;
      text-align: center;
    }

    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 480px) {
      .gallery {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">folks</a>
    <a href="illustrations.html" class="active" aria-current="page">draws</a>
    <a href="gallery.html">comix</a>
    <a href="story.html">tales</a>
    <a href="blog.html">stuff</a>
    <a href="profile.html#archive">archive</a>
  </nav>

  <main class="page-shell">
    <section class="page-head">
      <div>
        <p class="page-label">archive</p>
        <h1 class="page-title">draws</h1>
      </div>
      <div class="page-actions">
        <a href="https://suzuri.jp/Irorinri" target="_blank" rel="noopener">shop</a>
        <a href="profile.html">profile</a>
      </div>
    </section>

    <div class="gallery" aria-label="Illustration gallery"></div>
  </main>

  <footer>
    &copy; irorinri | <a href="profile.html">Profile</a> | <a href="profile.html#archive">Archive</a>
  </footer>

  <script type="module">
    import PhotoSwipeLightbox from 'https://unpkg.com/photoswipe@5/dist/photoswipe-lightbox.esm.min.js';

    const images = [
      { src: 'images/1.webp', width: 1000, height: 1000, date: '2024-11-10' },
      { src: 'images/2.webp', width: 1000, height: 1000, date: '2024-11-11' },
      { src: 'images/3.webp', width: 1000, height: 1000, date: '2024-11-13' },
      { src: 'images/4.webp', width: 1000, height: 1000, date: '2024-11-14' },
      { src: 'images/5.webp', width: 1000, height: 1000, date: '2024-11-15' },
      { src: 'images/6.webp', width: 1000, height: 1000, date: '2024-11-23' },
      { src: 'images/7.webp', width: 1000, height: 1000, date: '2024-11-26' },
      { src: 'images/8.webp', width: 1000, height: 1000, date: '2024-11-30' },
      { src: 'images/9.webp', width: 1000, height: 1000, date: '2024-12-08' },
      { src: 'images/10.webp', width: 1000, height: 1000, date: '2024-12-21' },
      { src: 'images/11.webp', width: 1000, height: 1000, date: '2024-12-22' },
      { src: 'images/12.webp', width: 1000, height: 1000, date: '2025-01-28' },
      { src: 'images/14.webp', width: 1000, height: 1000, date: '2025-01-30' },
      { src: 'images/15.webp', width: 1000, height: 1000, date: '2025-03-05' },
      { src: 'images/16.webp', width: 1000, height: 1000, date: '2025-04-10' },
      { src: 'images/17.webp', width: 1000, height: 1000, date: '2025-05-14' },
      { src: 'images/18.webp', width: 1000, height: 1000, date: '2025-05-16' },
      { src: 'images/19.webp', width: 1000, height: 1000, date: '2025-06-20' },
      { src: 'images/20.webp', width: 1000, height: 1000, date: '2025-06-23' },
      { src: 'images/21.webp', width: 1000, height: 1000, date: '2025-06-25' },
      { src: 'images/22.webp', width: 1000, height: 1000, date: '2025-07-12' },
      { src: 'images/23.webp', width: 1000, height: 1000, date: '2025-07-20' },
      { src: 'images/24.webp', width: 1000, height: 1000, date: '2025-08-03' },
      { src: 'images/25.webp', width: 1000, height: 1000, date: '2026-02-28' }
    ];

    const galleryElement = document.querySelector('.gallery');
    const fragment = document.createDocumentFragment();

    images.slice().reverse().forEach(({ src, width, height, date }) => {
      const link = document.createElement('a');
      link.href = src;
      link.dataset.pswpWidth = String(width);
      link.dataset.pswpHeight = String(height);

      const image = document.createElement('img');
      image.src = src;
      image.alt = `Illustration posted on ${date}`;
      image.loading = 'lazy';

      const caption = document.createElement('span');
      caption.className = 'hidden-caption-content';
      caption.textContent = date;

      link.append(image, caption);
      fragment.appendChild(link);
    });

    galleryElement.appendChild(fragment);

    const lightbox = new PhotoSwipeLightbox({
      gallery: '.gallery',
      children: 'a',
      loop: false,
      pswpModule: () => import('https://unpkg.com/photoswipe@5/dist/photoswipe.esm.min.js'),
    });

    lightbox.on('uiRegister', () => {
      lightbox.pswp.ui.registerElement({
        name: 'custom-counter',
        order: 5,
        isButton: false,
        appendTo: 'bar',
        html: '',
        onInit: (element, pswp) => {
          Object.assign(element.style, {
            color: 'white',
            fontSize: '15px',
            fontFamily: 'Arial, sans-serif',
            fontWeight: 'bold',
            position: 'relative',
            top: '20px',
            left: '30px',
            padding: '2px',
            webkitTextStroke: '1px rgba(128, 128, 128, 0.8)',
            textStroke: '1px rgba(128, 128, 128, 0.8)',
          });

          pswp.on('change', () => {
            const total = pswp.getNumItems();
            const index = total - pswp.currIndex;
            element.textContent = `${index} / ${total}`;
          });
        },
      });

      lightbox.pswp.ui.registerElement({
        name: 'custom-caption',
        order: 9,
        isButton: false,
        appendTo: 'wrapper',
        html: '',
        onInit: (element, pswp) => {
          element.className = 'pswp__custom-caption';
          pswp.on('change', () => {
            const caption = pswp.currSlide?.data.element.querySelector('.hidden-caption-content');
            element.textContent = caption ? caption.textContent : '';
          });
        },
      });
    });

    lightbox.init();
  </script>
</body>
</html>
