  .gallery {

    border: none;
    border-radius: 0;
    font-size: 0.8em !important;
    padding: 0.2em 1.4em !important;
    text-decoration: none;
    letter-spacing: 0.05em;
    cursor: pointer;
  }

  .suzuri-btn,

  .suzuri-btn:active,
  .suzuri-btn:focus,
  .suzuri-btn:focus-visible {
    background: #dddddd !important;
    color: #a3a3a3 !important;
    outline: none !important;
    box-shadow: none !important;

    { src: 'images/29.webp', width: 1000, height: 1000, date: '2026-02-28' }
  ];

  const galleryElement = document.querySelector('.gallery');
  const fragment = document.createDocumentFragment();

  images.slice().reverse().forEach(({ src, width, height, date }) => {
    const link = document.createElement('a');
    link.href = src;
    link.dataset.pswpWidth = String(width);
    link.dataset.pswpHeight = String(height);

    const image = document.createElement('img');
    image.src = src;
    image.alt = 'イラスト';
    image.loading = 'lazy';

    const caption = document.createElement('span');
    caption.className = 'hidden-caption-content';
    caption.style.display = 'none';
    caption.textContent = date;

    link.append(image, caption);
    fragment.appendChild(link);
  });

  galleryElement.appendChild(fragment);

  window.addEventListener('pageshow', function() {
    document.querySelectorAll('.suzuri-btn').forEach(function(btn) {
      btn.blur();
    });
  });

  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.suzuri-btn').forEach(function(btn) {
      btn.addEventListener('mouseup', function() {
        btn.blur();
      });
    });
  });
</script>

<script type="module">
  async function initLightbox() {
    try {
      const { default: PhotoSwipeLightbox } = await import('https://unpkg.com/photoswipe@5/dist/photoswipe-lightbox.esm.min.js');

      const lightbox = new PhotoSwipeLightbox({
        gallery: '.gallery',
        children: 'a',
        pswpModule: () => import('https://unpkg.com/photoswipe@5/dist/photoswipe.esm.min.js'),
        loop: false,
      });

      lightbox.on('uiRegister', () => {
        lightbox.pswp.ui.registerElement({
          name: 'custom-counter',
          order: 5,
          isButton: false,
          appendTo: 'bar',
          html: '',
          onInit: (el, pswp) => {
            Object.assign(el.style, {
              color: 'white',
              fontSize: '15px',
              fontFamily: 'Arial, sans-serif',
              fontWeight: 'bold',
              position: 'relative',
              top: '20px',
              left: '30px',
              padding: '2px',
              webkitTextStroke: '1px rgba(128, 128, 128, 0.8)',
              textStroke: '1px rgba(128, 128, 128, 0.8)',
            });
            pswp.on('change', () => {
              const total = pswp.getNumItems();
              const index = total - pswp.currIndex;
              el.innerHTML = `${index} / ${total}`;
            });
          },
        });

        lightbox.pswp.ui.registerElement({
          name: 'custom-caption',
          order: 9,
          isButton: false,
          appendTo: 'wrapper',
          html: '',
          onInit: (el, pswp) => {
            pswp.on('change', () => {
              const caption = pswp.currSlide?.data.element.querySelector('.hidden-caption-content');
              el.innerHTML = caption ? caption.textContent : 'キャプションなし';
            });
          },
        });

        const style = document.createElement('style');
        style.innerHTML = '.pswp__bg { background-color: #ADD8E6 !important; }';
        document.head.appendChild(style);
      });

      lightbox.init();
    } catch (error) {
      console.warn('PhotoSwipe could not be loaded. Gallery remains available without lightbox.', error);
    }
  }

  initLightbox();
</script>
