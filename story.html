<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Story archive by irorinri.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tales | irorinri</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="styles.css">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    .thumbnail-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 18px 10px;
      justify-items: center;
      padding: 0.5rem 0 0;
    }

    .thumbnail-gallery a {
      color: inherit;
      text-align: center;
      text-decoration: none;
    }

    .thumbnail-gallery img {
      width: 130px;
      height: auto;
      border-radius: 18px;
      transition: transform 0.2s ease;
    }

    .thumbnail-gallery img:hover {
      transform: scale(1.04);
    }

    .thumbnail-gallery p {
      margin: 0.45rem 0 0;
      color: var(--text-sub);
      font-size: 0.76rem;
      letter-spacing: 0.04em;
    }

    #novel-container {
      margin-top: 1rem;
      font-family: 'KaiTi', serif;
      font-size: 16px;
      line-height: 1.9;
      white-space: pre-wrap;
    }

    #novel-container p {
      margin: 0;
    }

    .back-button {
      display: none;
      margin: 1.25rem auto 0;
      padding: 0.6rem 1rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text-main);
      font: inherit;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">folks</a>
    <a href="illustrations.html">draws</a>
    <a href="gallery.html">comix</a>
    <a href="story.html" class="active" aria-current="page">tales</a>
    <a href="blog.html">stuff</a>
    <a href="profile.html#archive">archive</a>
  </nav>

  <main class="page-shell">
    <section class="page-head">
      <div>
        <p class="page-label">archive</p>
        <h1 class="page-title">tales</h1>
      </div>
      <div class="page-actions">
        <a href="https://irorinri.booth.pm/items/7156017" target="_blank" rel="noopener">print</a>
        <a href="profile.html">profile</a>
      </div>
    </section>

    <div id="thumbnail-gallery" class="thumbnail-gallery">
      <a href="?id=3">
        <picture>
          <source srcset="comics/a3.webp" type="image/webp">
          <img src="comics/a3.webp" alt="Story preview posted on 2024-09-09" loading="lazy">
        </picture>
        <p>2024-09-09</p>
      </a>
      <a href="?id=2">
        <picture>
          <source srcset="comics/a2.webp" type="image/webp">
          <img src="comics/a2.webp" alt="Story preview posted on 2024-08-20" loading="lazy">
        </picture>
        <p>2024-08-20</p>
      </a>
      <a href="?id=1">
        <picture>
          <source srcset="comics/a1.webp" type="image/webp">
          <img src="comics/a1.webp" alt="Story preview posted on 2024-07-23" loading="lazy">
        </picture>
        <p>2024-07-23</p>
      </a>
    </div>

    <div id="novel-container" aria-live="polite"></div>
    <button id="back-button" class="back-button" type="button">list</button>
  </main>

  <footer>
    &copy; irorinri | <a href="profile.html">Profile</a> | <a href="profile.html#archive">Archive</a>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const novelId = params.get('id');
    const container = document.getElementById('novel-container');
    const gallery = document.getElementById('thumbnail-gallery');
    const backButton = document.getElementById('back-button');

    function showGallery() {
      gallery.style.display = 'grid';
      container.innerHTML = '';
      backButton.style.display = 'none';
      window.history.replaceState({}, '', 'story.html');
    }

    function showError() {
      container.innerHTML = '<p>Failed to load this story.</p>';
    }

    if (novelId) {
      gallery.style.display = 'none';
      backButton.style.display = 'block';

      fetch(`data/n${novelId}.json`)
        .then((response) => {
          if (!response.ok) {
            throw new Error('load failed');
          }
          return response.json();
        })
        .then((data) => {
          container.innerHTML = `<p>${data.content}</p>`;
        })
        .catch((error) => {
          console.error(error);
          showError();
        });
    }

    backButton.addEventListener('click', () => {
      showGallery();
      window.scrollTo({ top: 0, behavior: 'auto' });
    });
  </script>
</body>
</html>
