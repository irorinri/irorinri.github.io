<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Blog, diary, snapshot, and chatter archive by irorinri.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stuff | irorinri</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="styles.css">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    body.blog-page {
      font-size: 10px;
      line-height: 1.6;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem 1rem 3rem;
    }

    footer {
      text-align: center;
    }

    [hidden] {
      display: none !important;
    }

    .blog-section,
    .blog-e {
      margin-bottom: 20px;
    }

    .blog-section h2,
    .blog-e h2 {
      margin: 0;
      font-size: inherit;
      font-weight: normal;
    }

    .blog-section p,
    .blog-e p {
      margin: 0;
    }

    .toggle-link {
      display: block;
      width: 100%;
      margin-bottom: 16px;
      padding: 0;
      border: 0;
      background: none;
      color: #000;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .toggle-link:hover {
      color: #555;
    }

    .toggle-link--tight {
      margin-bottom: 0;
    }

    .toggle-group {
      margin-bottom: 14px;
    }

    .toggle-confirm-row {
      display: flex;
      gap: 18px;
      align-items: center;
      margin-bottom: 0;
    }

    .toggle-gap {
      height: 20px;
    }

    .diary-buttons {
      display: grid;
      grid-template-columns: repeat(10, 30px);
      grid-template-rows: repeat(2, 30px);
      gap: 0;
      margin: 10px 0 30px;
    }

    .diary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      padding: 0;
      border: 1px solid #ccc;
      background-color: #f9f9f9;
      color: #000;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .diary-button:hover {
      background-color: #d0d0d0;
    }

    .diary-button.selected {
      background-color: #dfdfdf;
      font-weight: bold;
    }

    #toggle-diary {
      margin-bottom: 24px;
    }

    .recent-entry-section {
      margin: 6px 0 28px;
      padding: 10px;
      background: #f8f8f8;
      border: 1px solid #e4e4e4;
      border-radius: 6px;
    }

    .recent-entry-head {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: normal;
    }

    .month-jump {
      margin: 0 0 10px;
      font-size: 11px;
    }

    .month-jump a {
      color: #000;
      text-decoration: none;
      border-bottom: 1px dotted #888;
    }

    .recent-entry {
      margin-bottom: 14px;
      scroll-margin-top: 86px;
    }

    .recent-entry:last-child {
      margin-bottom: 0;
    }

    .recent-entry .entry-title {
      margin: 0 0 6px;
      font-size: 12px;
      font-weight: normal;
    }

    .recent-entry .entry-body {
      font-size: 11px;
      line-height: 1.65;
    }
  </style>
</head>
<body class="blog-page">
  <nav>
    <a href="index.html">folks</a>
    <a href="illustrations.html">draws</a>
    <a href="gallery.html">comix</a>
    <a href="story.html">tales</a>
    <a href="blog.html" class="active" aria-current="page">stuff</a>
    <a href="profile.html#archive">archive</a>
  </nav>

  <main>
    <section class="recent-entry-section" aria-label="Recent entries">
      <h2 class="recent-entry-head">recent notes</h2>
      <p class="month-jump">
        <a href="#202507">2025-07</a> | <a href="#202506">2025-06</a>
      </p>

      <article id="20250728" class="recent-entry">
        <h3 class="entry-title" id="202507">2025-07-28 / The Ocean AItuber</h3>
        <div class="entry-body" data-entry-file="blog/2025-07-28.html"></div>
      </article>

      <article id="20250720" class="recent-entry">
        <h3 class="entry-title">2025-07-20 / First print of my doujinshi</h3>
        <div class="entry-body" data-entry-file="blog/2025-07-20.html"></div>
      </article>

      <article id="20250625" class="recent-entry">
        <h3 class="entry-title" id="202506">2025-06-25 / AItuber Kachess Design</h3>
        <div class="entry-body" data-entry-file="blog/2025-06-25.html"></div>
      </article>

      <article id="20250621" class="recent-entry">
        <h3 class="entry-title">2025-06-21 / Shogi in Unity</h3>
        <div class="entry-body" data-entry-file="blog/2025-06-21.html"></div>
      </article>
    </section>

    <section class="blog-section" aria-label="Embedded sections">
      <div class="toggle-group">
        <button id="toggle-uses" class="toggle-link" type="button" aria-expanded="false" aria-controls="uses-main">show uses</button>
        <button id="toggle-uses-hide-top" class="toggle-link" type="button" hidden>hide uses</button>
      </div>
      <div id="uses-main" hidden>
        <div id="uses-inner"></div>
        <button id="toggle-uses-hide-bottom" class="toggle-link" type="button">hide uses</button>
      </div>

      <button id="toggle-snapshot" class="toggle-link" type="button" aria-expanded="false" aria-controls="snapshot-main">show snapshot</button>
      <div id="toggle-snapshot-confirm-row" class="toggle-confirm-row" hidden>
        <button id="toggle-snapshot-confirm" class="toggle-link toggle-link--tight" type="button">Cringe Zone! Continue?</button>
        <button id="toggle-snapshot-back" class="toggle-link toggle-link--tight" type="button">Back</button>
      </div>
      <div id="snapshot-main" hidden>
        <button id="toggle-snapshot-hide-top" class="toggle-link" type="button">hide snapshot</button>
        <div id="snapshot-inner"></div>
        <button id="toggle-snapshot-hide-bottom" class="toggle-link" type="button">hide snapshot</button>
      </div>
    </section>

    <button id="toggle-diary" class="toggle-link" type="button" aria-expanded="false" aria-controls="diary-content">show diary</button>
    <div id="toggle-diary-confirm-row" class="toggle-confirm-row" hidden>
      <button id="toggle-diary-confirm" class="toggle-link toggle-link--tight" type="button">Private Room. Enter?</button>
      <button id="toggle-diary-back" class="toggle-link toggle-link--tight" type="button">Back</button>
    </div>
    <div id="toggle-diary-confirm-gap" class="toggle-gap" hidden></div>

    <button id="toggle-diary-top" class="toggle-link" type="button" hidden>hide diary</button>
    <div id="diary-buttons" class="diary-buttons" hidden></div>
    <div id="diary-content" hidden>
      <div id="diary-text"></div>
      <button id="toggle-diary-bottom" class="toggle-link" type="button">hide diary</button>
    </div>

    <button id="toggle-diary2" class="toggle-link" type="button" aria-expanded="false" aria-controls="diary-content2">show chatter</button>
    <div id="diary-buttons2" class="diary-buttons" hidden></div>
    <div id="diary-content2" hidden>
      <div id="diary-text2"></div>
      <button id="toggle-diary-bottom2" class="toggle-link" type="button">hide chatter</button>
    </div>
  </main>

  <footer>
    &copy; irorinri | <a href="profile.html">Profile</a> | <a href="profile.html#archive">Archive</a>
  </footer>

  <script>
    const $ = (id) => document.getElementById(id);
    const diaryButtonCount = 20;
    const chatterButtonCount = 20;
    const visibleDiaryLabels = 3;
    const visibleChatterLabels = 1;

    async function loadRecentEntries() {
      const entries = document.querySelectorAll('[data-entry-file]');

      for (const entry of entries) {
        try {
          const response = await fetch(entry.dataset.entryFile);
          if (!response.ok) {
            throw new Error(`Failed to load ${entry.dataset.entryFile}`);
          }
          entry.innerHTML = await response.text();
        } catch (error) {
          entry.innerHTML = '<p>Failed to load this entry.</p>';
          console.error(error);
        }
      }
    }

    async function loadEmbeddedMain(url, target, fallbackText) {
      if (target.dataset.loaded === 'true') {
        return;
      }

      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`Failed to load ${url}`);
        }

        const wrapper = document.createElement('div');
        wrapper.innerHTML = await response.text();
        const main = wrapper.querySelector('main') || wrapper;
        target.innerHTML = main.innerHTML;
        target.dataset.loaded = 'true';
      } catch (error) {
        target.innerHTML = `<p>${fallbackText}</p>`;
        console.error(error);
      }
    }

    function setSelectedButton(buttonClass, id) {
      document.querySelectorAll(`.${buttonClass}`).forEach((button) => {
        button.classList.toggle('selected', button.dataset.id === String(id));
      });
    }

    function buildEntryButtons(container, buttonClass, total, visibleLabelCount, labelPrefix, onSelect) {
      container.replaceChildren();

      for (let i = 1; i <= total; i += 1) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `diary-button ${buttonClass}`;
        button.dataset.id = String(i);
        button.textContent = i <= visibleLabelCount ? String(i) : '';
        button.setAttribute('aria-label', `${labelPrefix} ${i}`);
        button.addEventListener('click', () => onSelect(i));
        container.appendChild(button);
      }
    }

    async function loadDiaryEntry(id) {
      try {
        const response = await fetch(`diary/${id}.html`);
        if (!response.ok) {
          throw new Error(`Failed to load diary/${id}.html`);
        }

        $('diary-text').innerHTML = await response.text();
      } catch (error) {
        $('diary-text').innerHTML = '<p>Failed to load this entry.</p>';
        console.error(error);
      }

      setSelectedButton('diary-button--diary', id);
    }

    async function loadChatterEntry(id) {
      try {
        const response = await fetch(`diary2/${id}.html`);
        if (!response.ok) {
          throw new Error(`Failed to load diary2/${id}.html`);
        }

        $('diary-text2').innerHTML = await response.text();
      } catch (error) {
        $('diary-text2').innerHTML = '<p>Failed to load this entry.</p>';
        console.error(error);
      }

      setSelectedButton('diary-button--chatter', id);
    }

    async function showUses() {
      $('toggle-uses').hidden = true;
      $('toggle-uses-hide-top').hidden = false;
      $('uses-main').hidden = false;
      $('toggle-uses').setAttribute('aria-expanded', 'true');
      await loadEmbeddedMain('soft.html', $('uses-inner'), 'Failed to load this section.');
    }

    function hideUses(scrollToTop = false) {
      $('uses-main').hidden = true;
      $('toggle-uses').hidden = false;
      $('toggle-uses-hide-top').hidden = true;
      $('toggle-uses').setAttribute('aria-expanded', 'false');

      if (scrollToTop) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function showSnapshotConfirm() {
      $('toggle-snapshot').hidden = true;
      $('toggle-snapshot-confirm-row').hidden = false;
    }

    async function showSnapshot() {
      $('toggle-snapshot-confirm-row').hidden = true;
      $('snapshot-main').hidden = false;
      $('toggle-snapshot').setAttribute('aria-expanded', 'true');
      await loadEmbeddedMain('icon.html', $('snapshot-inner'), 'Failed to load this section.');
    }

    function hideSnapshot(scrollToTop = false) {
      $('snapshot-main').hidden = true;
      $('toggle-snapshot-confirm-row').hidden = true;
      $('toggle-snapshot').hidden = false;
      $('toggle-snapshot').setAttribute('aria-expanded', 'false');

      if (scrollToTop) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function showDiaryConfirm() {
      $('toggle-diary').hidden = true;
      $('toggle-diary-confirm-row').hidden = false;
      $('toggle-diary-confirm-gap').hidden = false;
    }

    async function showDiary() {
      $('toggle-diary-confirm-row').hidden = true;
      $('toggle-diary-confirm-gap').hidden = true;
      $('toggle-diary-top').hidden = false;
      $('diary-buttons').hidden = false;
      $('diary-content').hidden = false;
      $('toggle-diary').setAttribute('aria-expanded', 'true');

      if (!$('diary-buttons').childElementCount) {
        buildEntryButtons($('diary-buttons'), 'diary-button--diary', diaryButtonCount, visibleDiaryLabels, 'Diary entry', loadDiaryEntry);
      }

      await loadDiaryEntry(1);
    }

    function hideDiary(scrollToTop = false) {
      $('diary-content').hidden = true;
      $('diary-buttons').hidden = true;
      $('toggle-diary-top').hidden = true;
      $('toggle-diary-confirm-row').hidden = true;
      $('toggle-diary-confirm-gap').hidden = true;
      $('toggle-diary').hidden = false;
      $('toggle-diary').setAttribute('aria-expanded', 'false');

      if (scrollToTop) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    async function showChatter() {
      $('diary-buttons2').hidden = false;
      $('diary-content2').hidden = false;
      $('toggle-diary2').textContent = 'hide chatter';
      $('toggle-diary2').setAttribute('aria-expanded', 'true');

      if (!$('diary-buttons2').childElementCount) {
        buildEntryButtons($('diary-buttons2'), 'diary-button--chatter', chatterButtonCount, visibleChatterLabels, 'Chatter entry', loadChatterEntry);
      }

      await loadChatterEntry(1);
    }

    function hideChatter(scrollToTop = false) {
      $('diary-content2').hidden = true;
      $('diary-buttons2').hidden = true;
      $('toggle-diary2').textContent = 'show chatter';
      $('toggle-diary2').setAttribute('aria-expanded', 'false');

      if (scrollToTop) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    $('toggle-uses').addEventListener('click', showUses);
    $('toggle-uses-hide-top').addEventListener('click', () => hideUses(false));
    $('toggle-uses-hide-bottom').addEventListener('click', () => hideUses(true));

    $('toggle-snapshot').addEventListener('click', showSnapshotConfirm);
    $('toggle-snapshot-confirm').addEventListener('click', showSnapshot);
    $('toggle-snapshot-back').addEventListener('click', () => {
      $('toggle-snapshot-confirm-row').hidden = true;
      $('toggle-snapshot').hidden = false;
    });
    $('toggle-snapshot-hide-top').addEventListener('click', () => hideSnapshot(false));
    $('toggle-snapshot-hide-bottom').addEventListener('click', () => hideSnapshot(true));

    $('toggle-diary').addEventListener('click', showDiaryConfirm);
    $('toggle-diary-confirm').addEventListener('click', showDiary);
    $('toggle-diary-back').addEventListener('click', () => {
      $('toggle-diary-confirm-row').hidden = true;
      $('toggle-diary-confirm-gap').hidden = true;
      $('toggle-diary').hidden = false;
    });
    $('toggle-diary-top').addEventListener('click', () => hideDiary(false));
    $('toggle-diary-bottom').addEventListener('click', () => hideDiary(true));

    $('toggle-diary2').addEventListener('click', async () => {
      if ($('diary-content2').hidden) {
        await showChatter();
      } else {
        hideChatter(false);
      }
    });
    $('toggle-diary-bottom2').addEventListener('click', () => hideChatter(true));

    loadRecentEntries();
  </script>
</body>
</html>
