<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Comix archive and visual story pages by irorinri.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comix | irorinri</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/photoswipe@5/dist/photoswipe.css">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    .page-actions {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin: 1.25rem 0 0.75rem;
    }

    .page-actions a {
      display: inline-block;
      padding: 0.4em 1.2em;
      border-radius: 0;
      background: #dddddd;
      color: #878787;
      font-size: 0.8em;
      font-weight: bold;
      letter-spacing: 0.05em;
      text-decoration: none;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .page-actions a:hover {
      background: #cfcfcf;
      color: #666;
    }

    .image-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 0.75rem 0 0;
    }

    .image-gallery a {
      color: inherit;
      text-align: center;
      text-decoration: none;
    }

    .image-gallery img {
      width: 100%;
      max-width: 300px;
      height: auto;
      border-radius: 10px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .image-gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .image-gallery .date {
      margin-top: 5px;
      color: #444;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">folks</a>
    <a href="illustrations.html">draws</a>
    <a href="gallery.html" class="active" aria-current="page">comix</a>
    <a href="story.html">tales</a>
    <a href="blog.html">stuff</a>
    <a href="profile.html#archive">archive</a>
  </nav>

  <main>
    <div class="page-actions">
      <a href="https://irorinri.booth.pm/items/7206655" target="_blank" rel="noopener">Buy Print</a>
      <a href="profile.html">Profile</a>
    </div>

    <div class="image-gallery">
      <a href="comics/2.webp">
        <picture>
          <source srcset="comics/2.webp" type="image/webp">
          <img src="comics/2.webp" alt="Comic page posted on 2024-06-15" loading="lazy" width="500" height="500">
        </picture>
        <div class="date">2024-06-15</div>
      </a>
      <a href="comics/3.webp">
        <picture>
          <source srcset="comics/3.webp" type="image/webp">
          <img src="comics/3.webp" alt="Comic page posted on 2024-06-15" loading="lazy" width="500" height="500">
        </picture>
        <div class="date">2024-06-15</div>
      </a>
      <a href="comics/4.webp">
        <picture>
          <source srcset="comics/4.webp" type="image/webp">
          <img src="comics/4.webp" alt="Comic page posted on 2024-06-15" loading="lazy" width="500" height="500">
        </picture>
        <div class="date">2024-06-15</div>
      </a>
      <a href="comics/1.webp">
        <picture>
          <source srcset="comics/1.webp" type="image/webp">
          <img src="comics/1.webp" alt="Comic page posted on 2023-07-11" loading="lazy" width="500" height="500">
        </picture>
        <div class="date">2023-07-11</div>
      </a>
    </div>
  </main>

  <footer>
    &copy; irorinri | <a href="profile.html">Profile</a> | <a href="profile.html#archive">Archive</a>
  </footer>

  <script type="module">
    import PhotoSwipeLightbox from 'https://unpkg.com/photoswipe@5/dist/photoswipe-lightbox.esm.min.js';

    const photoSwipeStyle = document.createElement('style');
    photoSwipeStyle.textContent = '.pswp__bg { background-color: #add8e6 !important; }';
    document.head.appendChild(photoSwipeStyle);

    const gallery = document.querySelector('.image-gallery');
    const links = gallery.querySelectorAll('a');

    links.forEach((link) => {
      const img = link.querySelector('img');
      const image = new Image();
      image.src = img.src;
      image.onload = () => {
        link.dataset.pswpWidth = image.width;
        link.dataset.pswpHeight = image.height;
      };
    });

    const lightbox = new PhotoSwipeLightbox({
      gallery: '.image-gallery',
      children: 'a',
      pswpModule: () => import('https://unpkg.com/photoswipe@5/dist/photoswipe.esm.min.js'),
    });

    lightbox.init();
  </script>
</body>
</html>
