<!-- PhotoSwipe Scripts -->
<script type="module">
  import PhotoSwipeLightbox from 'https://unpkg.com/photoswipe@5/dist/photoswipe-lightbox.esm.min.js';

  const gallery = document.querySelector('.image-gallery');
  const links = gallery.querySelectorAll('a');

  // 鬮ｯ・ｷ陋ｹ・ｻ郢晢ｽｻ髯具ｽｻ繝ｻ・､鬮ｯ・ｷ陷代・・ｽ・ｸ霑ｺ・ｰ繝ｻ・ｰ鬩幢ｽ｢繝ｻ・ｧ鬨ｾ蛹・ｽｽ・ｻ郢晢ｽｻ繝ｻ・ｯ鬨ｾ・ｧ繝ｻ・ｮ鬩肴得・ｽ・ｫ鬩幢ｽ｢繝ｻ・ｧ鬮ｮ蛹ｺ・ｧ・ｫ陟募ｮ｣霎ｧ陷肴ｺｷ・ｹ・ｲ郢晢ｽｻ繝ｻ・ｰ鬩搾ｽｵ繝ｻ・ｺ郢晢ｽｻ繝ｻ・ｦ鬯ｮ・ｫ繝ｻ・ｪ郢晢ｽｻ繝ｻ・ｭ鬮ｯ讖ｸ・ｽ・ｳ驛｢譎｢・ｽ・ｻ
  links.forEach(link => {
    const img = link.querySelector('img');
    const image = new Image();
    image.src = img.src;
    image.onload = () => {
      link.dataset.pswpWidth = image.width;
      link.dataset.pswpHeight = image.height;
    };
  });

  const lightbox = new PhotoSwipeLightbox({
    gallery: '.image-gallery',
    children: 'a',
    pswpModule: () => import('https://unpkg.com/photoswipe@5/dist/photoswipe.esm.min.js'),
  });

  // 鬩幢ｽ｢隴弱・・ｽ・ｼ隴・搨・ｰ鬩幢ｽ｢隴主・讓滄し・ｺ陝ｶ・ｷ繝ｻ・ｹ隴趣ｽ｢繝ｻ・ｽ繝ｻ・ｯ鬩幢ｽ｢繝ｻ・ｧ郢晢ｽｻ繝ｻ・､鬩幢ｽ｢隴惹ｸ橸ｽｹ・ｲ驛｢譎｢・ｽ・ｻ鬯ｮ・｢繝ｻ・ｭ髫ｴ・ｴ繝ｻ・ｧ髯ｷ謳ｾ・ｽ・ｹ髮趣ｽｼ繝ｻ・ｶ郢晢ｽｻ繝ｻ・ｲ鬩幢ｽ｢繝ｻ・ｧ鬮ｮ蛹ｺ・ｩ・ｸ繝ｻ・ｽ繝ｻ・､鬨ｾ蛹・ｽｽ・ｻ髯晢ｽｲ繝ｻ・ｩ
  lightbox.on('uiRegister', () => {
    const style = document.createElement('style');
    style.innerHTML = `
      .pswp__bg {
        background-color: #ADD8E6 !important; /* 鬮ｮ譛ｱ・ｯ莨夲ｽｽ・ｽ繝ｻ・ｴ髮趣ｽｼ繝ｻ・ｶ郢晢ｽｻ繝ｻ・ｲ */
      }
    `;
    document.head.appendChild(style);
  });

  lightbox.init();
</script>
